<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#1a1209"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="65%" r="55%">
      <stop offset="0%" stop-color="#C8522A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C8522A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="25%" r="45%">
      <stop offset="0%" stop-color="#D4A843" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#D4A843" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Border -->
  <rect x="40" y="40" width="1120" height="550" rx="24" fill="none" stroke="#FFFFFF" stroke-opacity="0.07" stroke-width="1"/>

  <!-- Favicon icon (hexagon + M shape) -->
  <g transform="translate(80, 80)">
    <path d="M42 4L75.6 24V64L42 84L8.4 64V24L42 4Z" fill="#111009" stroke="#D4A843" stroke-width="1.5"/>
    <path d="M22 58V30L34 46L42 34L50 46L62 30V58" stroke="#C8522A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Top label -->
  <text x="152" y="116" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" letter-spacing="3" fill="#D4A843">MELANOGEEK · BLOG &amp; FORUM</text>

  <!-- Decorative line -->
  <line x1="80" y1="148" x2="420" y2="148" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="1"/>

  <!-- Main title -->
  <text x="80" y="300" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="92" font-weight="900" letter-spacing="-3" fill="#EDEBE6">Melanogeek</text>

  <!-- Tagline -->
  <text x="80" y="366" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="400" fill="#8C8070">La culture geek, vue d'Afrique.</text>

  <!-- Decorative gold bar -->
  <rect x="80" y="404" width="80" height="3" rx="2" fill="#D4A843" opacity="0.75"/>

  <!-- Bottom tags -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="500" fill="#5A5248">
    <text x="80"  y="496">Manga &amp; Animé</text>
    <text x="232" y="496">·</text>
    <text x="248" y="496">Gaming</text>
    <text x="344" y="496">·</text>
    <text x="360" y="496">Tech &amp; IA</text>
    <text x="460" y="496">·</text>
    <text x="476" y="496">Développement</text>
    <text x="648" y="496">·</text>
    <text x="664" y="496">Cinéma</text>
    <text x="748" y="496">·</text>
    <text x="764" y="496">Culture &amp; Société</text>
    <text x="956" y="496">·</text>
    <text x="972" y="496">Débat</text>
  </g>

  <!-- Bottom url -->
  <text x="80" y="552" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#3A3530" letter-spacing="1">melanogeek.com</text>

  <!-- Right decorative element -->
  <g transform="translate(900, 180)" opacity="0.05">
    <path d="M150 0L300 86V260L150 346L0 260V86L150 0Z" fill="none" stroke="white" stroke-width="2"/>
    <path d="M60 260V86L105 152L150 86L195 152L240 86V260" stroke="white" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
