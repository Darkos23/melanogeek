name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Hostinger git pull
        run: sleep 45

      - name: Call deploy.php
        run: |
          RESPONSE=$(curl -s -o /tmp/deploy_out.txt -w "%{http_code}" "https://melanogeek.com/deploy.php")
          echo "HTTP status: $RESPONSE"
          cat /tmp/deploy_out.txt | head -50
