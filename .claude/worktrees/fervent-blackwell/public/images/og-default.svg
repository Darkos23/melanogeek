<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="60%" r="50%">
      <stop offset="0%" style="stop-color:#C8522A;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#C8522A;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#D4A843;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#D4A843;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Border -->
  <rect x="40" y="40" width="1120" height="550" rx="24" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Favicon icon (hexagon + M shape) -->
  <g transform="translate(80, 80)">
    <path d="M42 4L75.6 24V64L42 84L8.4 64V24L42 4Z" fill="#111009" stroke="#D4A843" stroke-width="1.5"/>
    <path d="M22 58V30L34 46L42 34L50 46L62 30V58" stroke="#C8522A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Top label -->
  <text x="152" y="116" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="600" letter-spacing="3" fill="#D4A843" text-transform="uppercase">MELANOGEEK · BLOG &amp; FORUM</text>

  <!-- Decorative line -->
  <line x1="80" y1="148" x2="400" y2="148" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Main title -->
  <text x="80" y="290" font-family="'Bricolage Grotesque', 'Arial Black', sans-serif" font-size="88" font-weight="800" letter-spacing="-4" fill="rgba(255,255,255,0.92)">Melanogeek</text>

  <!-- Tagline -->
  <text x="80" y="360" font-family="'Outfit', Arial, sans-serif" font-size="32" font-weight="400" fill="rgba(255,255,255,0.45)">La culture geek, vue d'Afrique.</text>

  <!-- Decorative gold bar -->
  <rect x="80" y="400" width="80" height="3" rx="2" fill="#D4A843" opacity="0.7"/>

  <!-- Bottom tags -->
  <g font-family="'JetBrains Mono', monospace" font-size="13" font-weight="500" letter-spacing="1" fill="rgba(255,255,255,0.25)">
    <text x="80" y="490">Manga &amp; Animé</text>
    <text x="222" y="490">·</text>
    <text x="234" y="490">Gaming</text>
    <text x="326" y="490">·</text>
    <text x="338" y="490">Tech &amp; IA</text>
    <text x="438" y="490">·</text>
    <text x="450" y="490">Développement</text>
    <text x="614" y="490">·</text>
    <text x="626" y="490">Cinéma</text>
    <text x="706" y="490">·</text>
    <text x="718" y="490">Culture &amp; Société</text>
    <text x="908" y="490">·</text>
    <text x="920" y="490">Débat</text>
  </g>

  <!-- Bottom url -->
  <text x="80" y="548" font-family="'JetBrains Mono', monospace" font-size="14" fill="rgba(255,255,255,0.15)" letter-spacing="1">melanogeek.com</text>

  <!-- Right decorative element -->
  <g transform="translate(920, 200)" opacity="0.04">
    <path d="M140 0L280 80V240L140 320L0 240V80L140 0Z" fill="none" stroke="white" stroke-width="2"/>
    <path d="M60 240V80L100 140L140 80L180 140L220 80V240" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
